name: Docker

# Build de l'image Docker a chaque push sur master et sur chaque PR.
# - PR            : build seul (validation, aucune publication)
# - push master   : build + push sur GitHub Container Registry (ghcr.io)
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read      # checkout
  packages: write     # push sur ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # lfs: true -> materialise le vrai binaire table2asn.linux (~199 Mo,
      # stocke en git-lfs) que le Dockerfile copie dans l'image.
      - name: Checkout (avec git-lfs)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion a GHCR uniquement hors PR (les PR de forks n'ont pas les droits
      # d'ecriture sur le registry, et on ne publie pas depuis une PR).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genere les tags/labels de l'image. Le nom d'image est mis en minuscules
      # automatiquement (ghcr.io/ffillouxdev/gsub).
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # push seulement sur master ; sur PR on se contente de builder.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache partage entre runs pour accelerer (apt + wheels wxPython).
          cache-from: type=gha
          cache-to: type=gha,mode=max
